<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hobi Mezat - Hobi Dünyasının Mezat Platformu</title>
  <meta
    name="description"
    content="Hobi dünyasının açık artırma platformu. Koleksiyonundaki hazineleri sat, yeni parçalar keşfet."
  />
  <meta property="og:title" content="Hobi Mezat" />
  <meta
    property="og:description"
    content="Hobi dünyasının açık artırma platformu. Koleksiyonundaki hazineleri sat, yeni parçalar keşfet."
  />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://hobimezat.com/ana_sayfa_premium.png" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #121212;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
    }

    .page {
      width: min(1320px, 100%);
      margin: 0 auto;
      padding: 24px 18px 24px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 34px;
      scrollbar-color: #f48c25 #232323;
      scrollbar-width: thin;
    }

    .photo-grid::-webkit-scrollbar {
      height: 8px;
    }

    .photo-grid::-webkit-scrollbar-track {
      border-radius: 999px;
      background: #232323;
    }

    .photo-grid::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: #f48c25;
    }

    .photo-card {
      overflow: hidden;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      background: #1a1a1a;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
    }

    .photo-card a {
      display: block;
      cursor: zoom-in;
    }

    .photo-card img {
      width: 100%;
      height: auto;
    }

    .intro {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 640px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      color: #f48c25;
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .slogan {
      margin-bottom: 24px;
      color: #b8b8b8;
      font-size: clamp(1rem, 2vw, 1.22rem);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .store-link {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 178px;
      min-height: 58px;
      border: 1px solid #3c3c3c;
      border-radius: 10px;
      background: #070707;
      color: #fff;
      padding: 9px 13px;
      text-decoration: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .store-link:hover {
      border-color: #f48c25;
      background: #111;
    }

    .store-icon {
      display: grid;
      flex: 0 0 28px;
      width: 28px;
      height: 28px;
      place-items: center;
    }

    .store-icon svg {
      width: 28px;
      height: 28px;
    }

    .store-copy {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.05;
    }

    .store-copy small {
      color: #cfcfcf;
      font-size: 0.64rem;
      font-weight: 650;
    }

    .store-copy strong {
      margin-top: 3px;
      color: #fff;
      font-size: 1rem;
      font-weight: 850;
    }

    footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      color: #666;
      font-size: 0.84rem;
      text-align: center;
    }

    footer a {
      color: #f48c25;
      text-decoration: none;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(0, 0, 0, 0.84);
    }

    .lightbox:target {
      display: flex;
    }

    .lightbox img {
      width: min(92vw, 760px);
      max-height: 86vh;
      border-radius: 18px;
      object-fit: contain;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
    }

    .lightbox-close {
      position: fixed;
      inset: 0;
      cursor: zoom-out;
    }

    .lightbox-button {
      position: fixed;
      top: 16px;
      right: 18px;
      z-index: 21;
      display: grid;
      width: 44px;
      height: 44px;
      place-items: center;
      border: 1px solid #444;
      border-radius: 999px;
      background: #181818;
      color: #f48c25;
      font-size: 1.6rem;
      line-height: 1;
      text-decoration: none;
    }

    @media (max-width: 980px) {
      .photo-grid {
        display: flex;
        gap: 14px;
        margin-inline: -18px;
        overflow-x: auto;
        padding: 0 18px 12px;
        scroll-snap-type: x proximity;
        scroll-padding-inline: 18px;
        -webkit-overflow-scrolling: touch;
      }

      .photo-card {
        flex: 0 0 220px;
        scroll-snap-align: start;
        scroll-snap-stop: always;
      }
    }

    @media (max-width: 560px) {
      .page {
        padding: 14px 12px 22px;
      }

      .photo-grid {
        margin-inline: -12px;
        margin-bottom: 28px;
        padding: 0 calc((100vw - min(82vw, 340px)) / 2) 14px;
        scroll-padding-inline: calc((100vw - min(82vw, 340px)) / 2);
      }

      .photo-card {
        flex: 0 0 min(82vw, 340px);
        scroll-snap-align: center;
      }

      .links {
        width: 100%;
      }

      .store-link {
        width: calc(50% - 6px);
        min-width: 0;
      }

      .store-copy small {
        font-size: 0.58rem;
      }

      .store-copy strong {
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="photo-grid" aria-label="Hobi Mezat uygulama fotoğrafları">
      <div class="photo-card">
        <a href="#foto-ana-sayfa" aria-label="Ana sayfa görselini büyüt">
          <img
            src="ana_sayfa_premium.png"
            alt="Hobi Mezat ana sayfa ekran görüntüsü"
            width="1024"
            height="1024"
          />
        </a>
      </div>

      <div class="photo-card">
        <a href="#foto-kategoriler" aria-label="Kategoriler görselini büyüt">
          <img
            src="kategoriler_premium.png"
            alt="Hobi Mezat kategoriler ekran görüntüsü"
            width="1024"
            height="1024"
          />
        </a>
      </div>

      <div class="photo-card">
        <a href="#foto-ilan-ver" aria-label="İlan verme görselini büyüt">
          <img
            src="ilan_ver_premium.png"
            alt="Hobi Mezat ilan verme ekran görüntüsü"
            width="1024"
            height="1024"
          />
        </a>
      </div>

      <div class="photo-card">
        <a href="#foto-mesaj-teklif" aria-label="Mesaj ve teklif görselini büyüt">
          <img
            src="mesaj_teklif_premium.png"
            alt="Hobi Mezat mesaj ve teklif ekran görüntüsü"
            width="1024"
            height="1024"
          />
        </a>
      </div>

      <div class="photo-card">
        <a href="#foto-profil" aria-label="Profil görselini büyüt">
          <img
            src="profil_premium.png"
            alt="Hobi Mezat profil ekran görüntüsü"
            width="1024"
            height="1024"
          />
        </a>
      </div>
    </section>

    <section class="intro" aria-label="Hobi Mezat bağlantıları">
      <h1>Hobi Mezat</h1>
      <p class="slogan">
        Hobi dünyasının açık artırma platformu. Koleksiyonundaki hazineleri sat,
        yeni parçalar keşfet.
      </p>

      <div class="links">
        <a
          class="store-link"
          href="https://play.google.com/store/apps/details?id=com.hobimezat.app"
          target="_blank"
          rel="noopener"
        >
          <span class="store-icon" aria-hidden="true">
            <svg viewBox="0 0 32 32" role="img">
              <path fill="#34a853" d="M4.8 3.7c-.4.4-.6 1-.6 1.8v21c0 .8.2 1.4.6 1.8l.1.1L16.7 16 4.9 3.6l-.1.1Z" />
              <path fill="#fbbc04" d="m20.6 20.1-3.9-4.1 3.9-4.1.1.1 4.7 2.7c1.3.7 1.3 1.9 0 2.6l-4.7 2.7-.1.1Z" />
              <path fill="#4285f4" d="m20.7 20-4-4L4.8 28.3c.7.7 1.8.7 3.1 0L20.7 20Z" />
              <path fill="#ea4335" d="M20.7 12 7.9 3.7C6.6 3 5.5 3 4.8 3.7L16.7 16l4-4Z" />
            </svg>
          </span>
          <span class="store-copy">
            <small>HEMEN İNDİR</small>
            <strong>Google Play</strong>
          </span>
        </a>
        <a
          class="store-link"
          href="https://apps.apple.com/tr/app/id6762036610"
          target="_blank"
          rel="noopener"
        >
          <span class="store-icon" aria-hidden="true">
            <svg viewBox="0 0 32 32" role="img">
              <path fill="#fff" d="M22.8 16.9c0-3 2.5-4.5 2.6-4.6-1.4-2.1-3.6-2.4-4.4-2.4-1.9-.2-3.6 1.1-4.6 1.1-.9 0-2.4-1.1-4-1-2 0-3.9 1.2-5 3-2.1 3.7-.5 9.1 1.5 12.1 1 1.5 2.2 3.1 3.8 3.1 1.5-.1 2.1-1 4-1s2.4 1 4 1c1.6 0 2.7-1.5 3.7-3 1.2-1.7 1.7-3.4 1.7-3.5-.1-.1-3.3-1.3-3.3-4.8ZM19.8 7.9c.8-1 1.4-2.4 1.2-3.8-1.2 0-2.6.8-3.5 1.8-.8.9-1.5 2.3-1.3 3.7 1.3.1 2.7-.7 3.6-1.7Z" />
            </svg>
          </span>
          <span class="store-copy">
            <small>İNDİR</small>
            <strong>App Store</strong>
          </span>
        </a>
      </div>
    </section>

    <footer>
      <a href="/gizlilik.html">Gizlilik Politikası</a>
      <span>·</span>
      <a href="mailto:fatihberber83@gmail.com">İletişim</a>
    </footer>
  </main>

  <div class="lightbox" id="foto-ana-sayfa" aria-label="Ana sayfa büyük görseli">
    <a class="lightbox-close" href="#" aria-label="Kapat"></a>
    <a class="lightbox-button" href="#" aria-label="Kapat">×</a>
    <img src="ana_sayfa_premium.png" alt="Hobi Mezat ana sayfa ekran görüntüsü" />
  </div>

  <div class="lightbox" id="foto-kategoriler" aria-label="Kategoriler büyük görseli">
    <a class="lightbox-close" href="#" aria-label="Kapat"></a>
    <a class="lightbox-button" href="#" aria-label="Kapat">×</a>
    <img src="kategoriler_premium.png" alt="Hobi Mezat kategoriler ekran görüntüsü" />
  </div>

  <div class="lightbox" id="foto-ilan-ver" aria-label="İlan verme büyük görseli">
    <a class="lightbox-close" href="#" aria-label="Kapat"></a>
    <a class="lightbox-button" href="#" aria-label="Kapat">×</a>
    <img src="ilan_ver_premium.png" alt="Hobi Mezat ilan verme ekran görüntüsü" />
  </div>

  <div class="lightbox" id="foto-mesaj-teklif" aria-label="Mesaj ve teklif büyük görseli">
    <a class="lightbox-close" href="#" aria-label="Kapat"></a>
    <a class="lightbox-button" href="#" aria-label="Kapat">×</a>
    <img src="mesaj_teklif_premium.png" alt="Hobi Mezat mesaj ve teklif ekran görüntüsü" />
  </div>

  <div class="lightbox" id="foto-profil" aria-label="Profil büyük görseli">
    <a class="lightbox-close" href="#" aria-label="Kapat"></a>
    <a class="lightbox-button" href="#" aria-label="Kapat">×</a>
    <img src="profil_premium.png" alt="Hobi Mezat profil ekran görüntüsü" />
  </div>
</body>
</html>
