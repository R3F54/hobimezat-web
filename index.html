<head>

    content="Koleksiyonundaki hazineleri sat, yeni parçalar keşfet."
  />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(244, 140, 37, 0.12), transparent 34rem),
        #121212;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
    }

    .page {
      width: min(1320px, 100%);
      margin: 0 auto;
      padding: 24px 18px 26px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 14px;
      scrollbar-color: #f48c25 #232323;
      scrollbar-width: thin;
    }

    .photo-grid::-webkit-scrollbar {
      height: 8px;
    }

    .photo-grid::-webkit-scrollbar-track {
      border-radius: 999px;
      background: #232323;
    }

    .photo-grid::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: #f48c25;
    }

    .photo-card {
      overflow: hidden;
      border: 1px solid #2f2f2f;
      border-radius: 14px;
      background: #1a1a1a;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
    }

    .photo-card a {
      display: block;
      cursor: zoom-in;
    }

    .photo-card img {
      width: 100%;
      height: auto;
    }

    .gallery-dots {
      display: flex;
      justify-content: center;
      gap: 9px;
      margin-bottom: 32px;
    }

    .gallery-dot {
      width: 8px;
      height: 8px;
      border: 0;
      border-radius: 999px;
      background: #464646;
      cursor: pointer;
      padding: 0;
    }

    .gallery-dot.is-active {
      width: 24px;
      background: #f48c25;
    }

    .intro {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 680px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      color: #f48c25;
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .slogan {
      margin-bottom: 24px;
      color: #c9c9c9;
      font-size: clamp(1rem, 2vw, 1.22rem);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 34px;
    }

    .store-link {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 184px;
      min-height: 58px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: #f48c25;
      color: #141414;
      padding: 9px 13px;
      text-decoration: none;
      box-shadow: 0 14px 30px rgba(244, 140, 37, 0.18);
    }

    .store-link:hover {
      background: #ff9a33;
      transform: translateY(-1px);
    }

    .store-icon {
      display: grid;
      flex: 0 0 28px;
      width: 28px;
      height: 28px;
      place-items: center;
    }

    .store-icon svg {
      width: 28px;
      height: 28px;
    }

    .store-copy {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.05;
    }

    .store-copy small {
      color: rgba(20, 20, 20, 0.72);
      font-size: 0.64rem;
      font-weight: 800;
    }

    .store-copy strong {
      margin-top: 3px;
      color: #141414;
      font-size: 1rem;
      font-weight: 900;
    }

    .site-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      width: min(760px, 100%);
      margin: 0 auto;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      color: #7c7c7c;
      font-size: 0.84rem;
      text-align: center;
    }

    .footer-brand {
      color: #9a9a9a;
      font-weight: 700;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .site-footer a {
      color: #f48c25;
      text-decoration: none;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(0, 0, 0, 0.84);
    }

    .lightbox:target {
      display: flex;
    }

    .lightbox img {
      width: min(92vw, 760px);
      max-height: 86vh;
      border-radius: 18px;
      object-fit: contain;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
    }

    .lightbox-close {
      position: fixed;
      inset: 0;
      cursor: zoom-out;
    }

    .lightbox-button {
      position: fixed;
      top: 16px;
      right: 18px;
      z-index: 21;
      display: grid;
      width: 44px;
      height: 44px;
      place-items: center;
      border: 1px solid #444;
      border-radius: 999px;
      background: #181818;
      color: #f48c25;
      font-size: 1.6rem;
      line-height: 1;
      text-decoration: none;
    }

    @media (max-width: 980px) {
      .photo-grid {
        display: flex;
        gap: 14px;
        margin-inline: -18px;
        overflow-x: auto;
        padding: 0 18px 12px;
        scroll-snap-type: x proximity;
        scroll-padding-inline: 18px;
        -webkit-overflow-scrolling: touch;
      }

      .photo-card {
        flex: 0 0 220px;
        scroll-snap-align: start;
        scroll-snap-stop: always;
      }
    }

    @media (max-width: 560px) {
      .page {
        padding: 14px 12px 24px;
      }

      .photo-grid {
        margin-inline: -12px;
        margin-bottom: 12px;
        padding: 0 calc((100vw - min(82vw, 340px)) / 2) 14px;
        scroll-padding-inline: calc((100vw - min(82vw, 340px)) / 2);
      }

      .photo-card {
        flex: 0 0 min(82vw, 340px);
        scroll-snap-align: center;
      }

      .gallery-dots {
        margin-bottom: 28px;
      }

      .links {
        width: 100%;
      }

      .store-link {
        width: calc(50% - 6px);
        min-width: 0;
      }

      .store-copy small {
        font-size: 0.56rem;
      }

      .store-copy strong {
        font-size: 0.9rem;
      }

      .site-footer {
        flex-direction: column;
        gap: 8px;
      }
    }
  </style>
</head>
<body>

    <div class="gallery-dots" aria-label="Galeri göstergesi">
      <button class="gallery-dot is-active" type="button" aria-label="1. fotoğraf" data-target="galeri-1"></button>
      <button class="gallery-dot" type="button" aria-label="2. fotoğraf" data-target="galeri-2"></button>
      <button class="gallery-dot" type="button" aria-label="3. fotoğraf" data-target="galeri-3"></button>
      <button class="gallery-dot" type="button" aria-label="4. fotoğraf" data-target="galeri-4"></button>
      <button class="gallery-dot" type="button" aria-label="5. fotoğraf" data-target="galeri-5"></button>

              <path fill="#fbbc04" d="m20.6 20.1-3.9-4.1 3.9-4.1.1.1 4.7 2.7c1.3.7 1.3 1.9 0 2.6l-4.7 2.7-.1.1Z" />

  <div class="lightbox" id="foto-ana-sayfa" aria-label="Ana sayfa büyük görseli">

    <a class="lightbox-button" href="#" aria-label="Kapat">×</a>
    <img src="ana_sayfa_premium_optimized.jpg" onerror="this.onerror=null; this.src='ana_sayfa_premium.png';" alt="Hobi Mezat ana sayfa ekran görüntüsü" />

  <div class="lightbox" id="foto-kategoriler" aria-label="Kategoriler büyük görseli">

    <img src="kategoriler_premium_optimized.jpg" onerror="this.onerror=null; this.src='kategoriler_premium.png';" alt="Hobi Mezat kategoriler ekran görüntüsü" />

  <div class="lightbox" id="foto-ilan-ver" aria-label="İlan verme büyük görseli">

  <div class="lightbox" id="foto-mesaj-teklif" aria-label="Mesaj ve teklif büyük görseli">

  <div class="lightbox" id="foto-profil" aria-label="Profil büyük görseli">

    <a class="lightbox-button" href="#" aria-label="Kapat">×</a>
    <img src="profil_premium_optimized.jpg" onerror="this.onerror=null; this.src='profil_premium.png';" alt="Hobi Mezat profil ekran görüntüsü" />
  </div>

  <script>
    const gallery = document.querySelector(".photo-grid");
    const cards = Array.from(document.querySelectorAll(".photo-card"));
    const dots = Array.from(document.querySelectorAll(".gallery-dot"));

    function setActiveDot(index) {
      dots.forEach((dot, dotIndex) => {
        dot.classList.toggle("is-active", dotIndex === index);
      });
    }

    dots.forEach((dot, index) => {
      dot.addEventListener("click", () => {
        cards[index].scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
        setActiveDot(index);
      });
    });

    if (gallery && "IntersectionObserver" in window) {
      const observer = new IntersectionObserver((entries) => {
        const visible = entries
          .filter((entry) => entry.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];

        if (visible) {
          setActiveDot(cards.indexOf(visible.target));
        }
      }, {
        root: gallery,
        threshold: [0.45, 0.6, 0.75]
      });

      cards.forEach((card) => observer.observe(card));
    }
  </script>
