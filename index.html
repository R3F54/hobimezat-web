<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hobi Mezat - Hobi Dünyasının Mezat Platformu</title>
  <meta
    name="description"
    content="Hobi dünyasının açık artırma platformu. Koleksiyonundaki hazineleri sat, yeni parçalar keşfet."
  />
  <meta property="og:title" content="Hobi Mezat" />
  <meta
    property="og:description"
    content="Hobi dünyasının açık artırma platformu. Koleksiyonundaki hazineleri sat, yeni parçalar keşfet."
  />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://hobimezat.com/ana_sayfa_premium.png" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #121212;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
    }

    .page {
      width: min(1320px, 100%);
      margin: 0 auto;
      padding: 24px 18px 24px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 34px;
      scrollbar-color: #f48c25 #232323;
      scrollbar-width: thin;
    }

    .photo-grid::-webkit-scrollbar {
      height: 8px;
    }

    .photo-grid::-webkit-scrollbar-track {
      border-radius: 999px;
      background: #232323;
    }

    .photo-grid::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: #f48c25;
    }

    .photo-card {
      overflow: hidden;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      background: #1a1a1a;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
    }

    .photo-card img {
      width: 100%;
      height: auto;
    }

    .intro {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 640px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      color: #f48c25;
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .slogan {
      margin-bottom: 24px;
      color: #b8b8b8;
      font-size: clamp(1rem, 2vw, 1.22rem);
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .store-link {
      min-width: 158px;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      background: #1f1f1f;
      color: #f48c25;
      font-size: 0.98rem;
      font-weight: 800;
      padding: 13px 22px;
      text-align: center;
      text-decoration: none;
    }

    .store-link:hover {
      background: #f48c25;
      color: #fff;
    }

    footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      color: #666;
      font-size: 0.84rem;
      text-align: center;
    }

    footer a {
      color: #f48c25;
      text-decoration: none;
    }

    @media (max-width: 980px) {
      .photo-grid {
        display: flex;
        gap: 14px;
        margin-inline: -18px;
        overflow-x: auto;
        padding: 0 18px 12px;
        scroll-snap-type: x proximity;
        scroll-padding-inline: 18px;
        -webkit-overflow-scrolling: touch;
      }

      .photo-card {
        flex: 0 0 220px;
        scroll-snap-align: start;
        scroll-snap-stop: always;
      }
    }

    @media (max-width: 560px) {
      .page {
        padding: 14px 12px 22px;
      }

      .photo-grid {
        margin-inline: -12px;
        margin-bottom: 28px;
        padding: 0 calc((100vw - min(82vw, 340px)) / 2) 14px;
        scroll-padding-inline: calc((100vw - min(82vw, 340px)) / 2);
      }

      .photo-card {
        flex: 0 0 min(82vw, 340px);
        scroll-snap-align: center;
      }

      .links,
      .store-link {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="photo-grid" aria-label="Hobi Mezat uygulama fotoğrafları">
      <div class="photo-card">
        <img
          src="ana_sayfa_premium.png"
          alt="Hobi Mezat ana sayfa ekran görüntüsü"
          width="1024"
          height="1024"
        />
      </div>

      <div class="photo-card">
        <img
          src="kategoriler_premium.png"
          alt="Hobi Mezat kategoriler ekran görüntüsü"
          width="1024"
          height="1024"
        />
      </div>

      <div class="photo-card">
        <img
          src="ilan_ver_premium.png"
          alt="Hobi Mezat ilan verme ekran görüntüsü"
          width="1024"
          height="1024"
        />
      </div>

      <div class="photo-card">
        <img
          src="mesaj_teklif_premium.png"
          alt="Hobi Mezat mesaj ve teklif ekran görüntüsü"
          width="1024"
          height="1024"
        />
      </div>

      <div class="photo-card">
        <img
          src="profil_premium.png"
          alt="Hobi Mezat profil ekran görüntüsü"
          width="1024"
          height="1024"
        />
      </div>
    </section>

    <section class="intro" aria-label="Hobi Mezat bağlantıları">
      <h1>Hobi Mezat</h1>
      <p class="slogan">
        Hobi dünyasının açık artırma platformu. Koleksiyonundaki hazineleri sat,
        yeni parçalar keşfet.
      </p>

      <div class="links">
        <a
          class="store-link"
          href="https://play.google.com/store/apps/details?id=com.hobimezat.app"
          target="_blank"
          rel="noopener"
        >Google Play</a>
        <a
          class="store-link"
          href="https://apps.apple.com/tr/app/id6762036610"
          target="_blank"
          rel="noopener"
        >App Store</a>
      </div>
    </section>

    <footer>
      <a href="/gizlilik.html">Gizlilik Politikası</a>
      <span>·</span>
      <a href="mailto:fatihberber83@gmail.com">İletişim</a>
    </footer>
  </main>
</body>
</html>
